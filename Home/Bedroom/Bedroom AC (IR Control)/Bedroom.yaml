substitutions:
  name: esp-web-tools-example-fc6b69
  friendly_name: Bedroom

packages:
  esphome.esp_web_tools_example: github://esphome/firmware/esp-web-tools/esp8266.yaml@main

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  # Forces the display light switch to show as "ON" at boot
  on_boot:
    priority: -100
    then:
      - switch.template.publish:
          id: display_light_switch
          state: ON

esp8266:
  board: nodemcuv2

api:
  encryption:
    key: O7oLqP/Bew8w5TUitdsGhx3fcPWAJx1IwHHG91oVDiA=

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

# =========================================
# Fallback Hotspot & Local Web UI
# =========================================
captive_portal:

web_server:
  port: 80

# =========================================
# Import Sensors from Home Assistant
# =========================================
sensor:
  - platform: homeassistant
    id: current_room_temp
    entity_id: sensor.esp_web_tools_example_e1c59b_temperature
    
  - platform: homeassistant
    id: current_room_humidity
    entity_id: sensor.esp_web_tools_example_e1c59b_humidity

# =========================================
# IR Hardware Configuration
# =========================================
remote_transmitter:
  pin: D7
  carrier_duty_percent: 50%

remote_receiver:
  id: ir_receiver
  pin: 
    number: D5
    inverted: true
    mode:
      input: true
      pullup: true
  tolerance: 50%
  dump: all

# =========================================
# Native LG Climate Component
# =========================================
climate:
  - platform: climate_ir_lg
    name: "AC"
    id: bedroom_ac
    receiver_id: ir_receiver
    sensor: current_room_temp
    visual:
      min_temperature: 18
      max_temperature: 30
      temperature_step: 1

# =========================================
# Custom AC Override Switches
# =========================================
switch:
  # 1. AC Display Light (Inverted Logic)
  - platform: template
    name: "AC Display Light"
    id: display_light_switch
    icon: "mdi:lightbulb-outline"
    optimistic: true
    turn_on_action:
      - remote_transmitter.transmit_pronto:
          data: "0000 006D 001E 0000 0079 017C 0014 003D 0012 0016 0012 0016 0013 0017 0012 003D 0013 0016 0013 0017 0012 0016 0011 003E 0013 003E 0012 0016 0013 0016 0012 0017 0012 0016 0013 0016 0012 0016 0012 0016 0012 0017 0012 0016 0012 0016 0012 003E 0013 0017 0012 003E 0013 0016 0012 0016 0012 003D 0012 003D 0012 0017 0012 0181"
    turn_off_action:
      - remote_transmitter.transmit_pronto:
          data: "0000 006D 001E 0000 0079 017C 0013 003D 0012 0016 0012 0016 0013 0017 0011 003D 0013 0016 0013 0017 0012 0016 0012 003E 0013 003E 0012 0016 0013 0016 0012 0017 0011 0016 0013 0016 0012 0016 0012 0016 0011 0017 0011 0016 0013 0016 0011 003E 0013 0017 0011 003E 0013 0016 0011 0016 0011 003D 0012 003D 0012 0017 0012 0181"

  # 2. AC HiCool (Turbo) Mode
  - platform: template
    name: "AC HiCool (Turbo)"
    icon: "mdi:snowflake-alert"
    optimistic: true
    turn_on_action:
      - remote_transmitter.transmit_pronto:
          data: "0000 006D 001E 0000 007A 017B 0011 003F 0014 0014 0014 0012 0015 0016 0014 003C 0014 0014 0014 0015 0013 0014 0013 0014 0014 0014 0013 0015 0013 003C 0014 0016 0013 0014 0013 0016 0014 0015 0013 0015 0013 0014 0014 0014 0014 0012 0016 003C 0014 003C 0013 0015 0013 003D 0013 003C 0014 003C 0013 003C 0013 0014 0015 0181"
      - lambda: |-
          id(bedroom_ac).target_temperature = 18;
          id(bedroom_ac).mode = climate::CLIMATE_MODE_COOL;
          id(bedroom_ac).publish_state();
    turn_off_action:
      - remote_transmitter.transmit_pronto:
          data: "0000 006D 001E 0000 007A 017B 0013 003D 0014 0014 0014 0014 0013 0015 0013 003C 0014 0014 0014 0014 0013 0014 0013 0013 0014 0014 0015 0016 0012 0014 0016 003D 0013 0016 0014 0014 0014 0014 0013 0014 0015 0015 0014 003C 0013 003C 0014 0015 0013 003C 0014 0014 0013 0013 0015 003C 0014 003D 0013 003C 0013 003D 0014 0181"

  # =========================================
  # Momentary Switches for Sony Bravia TV
  # =========================================
  
  # 3. TV Power Switch
  - platform: template
    name: "TV Power"
    id: switch_tv_power
    icon: "mdi:power"
    turn_on_action:
      - remote_transmitter.transmit_sony:
          data: 0xA90
          nbits: 12
          repeat:
            times: 3
            wait_time: 45ms
      - delay: 200ms
      - switch.turn_off: switch_tv_power

  # 4. TV Volume Up Switch
  - platform: template
    name: "TV Volume Up"
    id: switch_tv_vol_up
    icon: "mdi:volume-high"
    turn_on_action:
      - remote_transmitter.transmit_sony:
          data: 0x490
          nbits: 12
          repeat:
            times: 3
            wait_time: 45ms
      - delay: 200ms
      - switch.turn_off: switch_tv_vol_up

  # 5. TV Volume Down Switch
  - platform: template
    name: "TV Volume Down"
    id: switch_tv_vol_down
    icon: "mdi:volume-medium"
    turn_on_action:
      - remote_transmitter.transmit_sony:
          data: 0xC90
          nbits: 12
          repeat:
            times: 3
            wait_time: 45ms
      - delay: 200ms
      - switch.turn_off: switch_tv_vol_down

  # 6. TV Mute Switch
  - platform: template
    name: "TV Mute"
    id: switch_tv_mute
    icon: "mdi:volume-off"
    turn_on_action:
      - remote_transmitter.transmit_sony:
          data: 0x290
          nbits: 12
          repeat:
            times: 3
            wait_time: 45ms
      - delay: 200ms
      - switch.turn_off: switch_tv_mute