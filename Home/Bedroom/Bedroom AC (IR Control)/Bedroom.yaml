substitutions:
  name: esp-web-tools-example-fc6b69
  friendly_name: Bedroom

packages:
  esphome.esp_web_tools_example: github://esphome/firmware/esp-web-tools/esp8266.yaml@main

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - switch.template.publish:
          id: display_light_switch
          state: ON

esp8266:
  board: nodemcuv2

api:
  encryption:
    key: O7oLqP/Bew8w5TUitdsGhx3fcPWAJx1IwHHG91oVDiA=

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

captive_portal:

web_server:
  port: 80

# =========================================
# Sensors 
# =========================================
sensor:
  - platform: homeassistant
    id: current_room_temp
    entity_id: sensor.esp_web_tools_example_e1c59b_temperature
    
  - platform: homeassistant
    id: current_room_humidity
    entity_id: sensor.esp_web_tools_example_e1c59b_humidity

  # -----------------------------------------------
  # LDR Light Sensor (Voltage Divider on A0)
  # Circuit: 3V → LDR → A0 pin → 1kΩ → GND
  # (NodeMCU maps 0–3.3V input to 0–1V chip ADC)
  # -----------------------------------------------
# -----------------------------------------------
  # LDR Light Sensor (Pull-up Configuration)
  # Circuit: 3.3V → 1kΩ → A0 pin → LDR → GND
  # -----------------------------------------------
  - platform: adc
    pin: A0
    name: "Room Illuminance"
    id: room_light_level
    unit_of_measurement: "lx"
    icon: mdi:brightness-5
    device_class: illuminance
    state_class: measurement
    update_interval: 2s
    samples: 10                  # average 10 readings to reduce flicker noise
    filters:
      # Step 1: ESP8266 ADC reads 0.0 - 1.0V. 
      # Multiply by 3.3 to get the actual physical voltage at the A0 pin.
      - multiply: 3.3

      # Step 2: Convert voltage -> Resistance -> Lux
      - lambda: |-
          float v_supply = 3.3;       // NodeMCU output voltage
          float r1 = 1000.0;          // Your 1kΩ resistor
          float v_pin = x;            // Voltage at A0

          // Clamp values to prevent division by zero or negative results
          if (v_pin <= 0.01) return 10000.0;  // Max light (Flashlight = 0V)
          if (v_pin >= 3.29) return 0.0;      // Pitch black (3.3V)

          // Calculate actual LDR resistance in Ohms
          float r_ldr = (v_pin * r1) / (v_supply - v_pin);

          // Convert resistance to Lux (Standard approximation for LDRs)
          // 500000.0 is the calibration constant. 
          float lux = 500000.0 / r_ldr;

          return lux;

# =========================================
# RGB LED Configuration (Manual Control Only)
# =========================================
output:
  - platform: esp8266_pwm
    id: red_output
    pin: D3
  - platform: esp8266_pwm
    id: green_output
    pin: D2
  - platform: esp8266_pwm
    id: blue_output
    pin: D1

light:
  - platform: rgb
    name: "Status RGB LED"
    id: status_rgb_led
    red: red_output
    green: green_output
    blue: blue_output

# =========================================
# IR Hardware Configuration
# =========================================
remote_transmitter:
  pin: D7
  carrier_duty_percent: 50%

remote_receiver:
  id: ir_receiver
  pin: 
    number: D5
    inverted: true
    mode:
      input: true
      pullup: true
  tolerance: 50%
  dump: all

# =========================================
# Native LG Climate Component
# =========================================
climate:
  - platform: climate_ir_lg
    name: "AC"
    id: bedroom_ac
    receiver_id: ir_receiver
    sensor: current_room_temp
    visual:
      min_temperature: 18
      max_temperature: 30
      temperature_step: 1

# =========================================
# Custom AC Override Switches
# =========================================
switch:
  - platform: template
    name: "AC Display Light"
    id: display_light_switch
    icon: "mdi:lightbulb-outline"
    optimistic: true
    turn_on_action:
      - remote_transmitter.transmit_pronto:
          data: "0000 006D 001E 0000 0079 017C 0014 003D 0012 0016 0012 0016 0013 0017 0012 003D 0013 0016 0013 0017 0012 0016 0011 003E 0013 003E 0012 0016 0013 0016 0012 0017 0012 0016 0013 0016 0012 0016 0012 0016 0012 0017 0012 0016 0012 0016 0012 003E 0013 0017 0012 003E 0013 0016 0012 0016 0012 003D 0012 003D 0012 0017 0012 0181"
    turn_off_action:
      - remote_transmitter.transmit_pronto:
          data: "0000 006D 001E 0000 0079 017C 0013 003D 0012 0016 0012 0016 0013 0017 0011 003D 0013 0016 0013 0017 0012 0016 0012 003E 0013 003E 0012 0016 0013 0016 0012 0017 0011 0016 0013 0016 0012 0016 0012 0016 0011 0017 0011 0016 0013 0016 0011 003E 0013 0017 0011 003E 0013 0016 0011 0016 0011 003D 0012 003D 0012 0017 0012 0181"

  - platform: template
    name: "AC HiCool (Turbo)"
    icon: "mdi:snowflake-alert"
    optimistic: true
    turn_on_action:
      - remote_transmitter.transmit_pronto:
          data: "0000 006D 001E 0000 007A 017B 0011 003F 0014 0014 0014 0012 0015 0016 0014 003C 0014 0014 0014 0015 0013 0014 0013 0014 0014 0014 0013 0015 0013 003C 0014 0016 0013 0014 0013 0016 0014 0015 0013 0015 0013 0014 0014 0014 0014 0012 0016 003C 0014 003C 0013 0015 0013 003D 0013 003C 0014 003C 0013 003C 0013 0014 0015 0181"
      - lambda: |-
          id(bedroom_ac).target_temperature = 18;
          id(bedroom_ac).mode = climate::CLIMATE_MODE_COOL;
          id(bedroom_ac).publish_state();
    turn_off_action:
      - remote_transmitter.transmit_pronto:
          data: "0000 006D 001E 0000 007A 017B 0013 003D 0014 0014 0014 0014 0013 0015 0013 003C 0014 0014 0014 0014 0013 0014 0013 0013 0014 0014 0015 0016 0012 0014 0016 003D 0013 0016 0014 0014 0014 0014 0013 0014 0015 0015 0014 003C 0013 003C 0014 0015 0013 003C 0014 0014 0013 0013 0015 003C 0014 003D 0013 003C 0013 003D 0014 0181"

  # =========================================
  # Momentary Switches for Sony Bravia TV
  # =========================================
  - platform: template
    name: "TV Power"
    id: switch_tv_power
    icon: "mdi:power"
    turn_on_action:
      - remote_transmitter.transmit_sony:
          data: 0xA90
          nbits: 12
          repeat:
            times: 3
            wait_time: 45ms
      - delay: 200ms
      - switch.turn_off: switch_tv_power

  - platform: template
    name: "TV Volume Up"
    id: switch_tv_vol_up
    icon: "mdi:volume-high"
    turn_on_action:
      - remote_transmitter.transmit_sony:
          data: 0x490
          nbits: 12
          repeat:
            times: 3
            wait_time: 45ms
      - delay: 200ms
      - switch.turn_off: switch_tv_vol_up

  - platform: template
    name: "TV Volume Down"
    id: switch_tv_vol_down
    icon: "mdi:volume-medium"
    turn_on_action:
      - remote_transmitter.transmit_sony:
          data: 0xC90
          nbits: 12
          repeat:
            times: 3
            wait_time: 45ms
      - delay: 200ms
      - switch.turn_off: switch_tv_vol_down

  - platform: template
    name: "TV Mute"
    id: switch_tv_mute
    icon: "mdi:volume-off"
    turn_on_action:
      - remote_transmitter.transmit_sony:
          data: 0x290
          nbits: 12
          repeat:
            times: 3
            wait_time: 45ms
      - delay: 200ms
      - switch.turn_off: switch_tv_mute