substitutions:
  name: esp-web-tools-example-5f1378
  friendly_name: Bedroom
packages:
  esphome.esp_web_tools_example: github://esphome/example-configs/esp-web-tools/esp8266.yaml@main
esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
api:
  encryption:
    key: vnRnMBTIoWa7iFxjEyLCkyRToNj36dAnQ1r5RnJ4l/U=
  reboot_timeout: 0s

esp8266:
  board: d1_mini

# ------------------ OUTPUTS ------------------
output:
  - platform: gpio
    id: bedroomFanOutput
    pin: GPIO2
    inverted: True

  - platform: gpio
    id: bedroomLightOutput
    pin: GPIO0
    inverted: True

  - platform: gpio
    id: bedroomNightLampOutput
    pin: GPIO14
    inverted: True

  - platform: gpio
    id: bedroomSocketOutput
    pin: GPIO12
    inverted: True

# ------------------ ENTITIES ------------------
light:
  - platform: binary
    id: bedroomLight
    name: "Light"
    output: bedroomLightOutput

  - platform: binary
    id: bedroomNightLamp
    name: "Night Lamp"
    output: bedroomNightLampOutput
fan:
  - platform: binary
    id: bedroomFan
    name: "Fan"
    output: bedroomFanOutput

switch:
  - platform: output
    id: bedroomSocket
    name: "Socket"
    output: bedroomSocketOutput

# ------------------ PHYSICAL SWITCHES ------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO3
      inverted: true
      mode:
        input: true
        pullup: true
    id: "bedroomLightSwitch"
    on_press:
      - light.turn_on: bedroomLight
    on_release:
      - light.turn_off: bedroomLight

  - platform: gpio
    pin:
      number: GPIO5
      inverted: true
      mode:
        input: true
        pullup: true
    id: "bedroomFanSwitch"
    on_press:
      - fan.turn_on: bedroomFan
    on_release:
      - fan.turn_off: bedroomFan

  - platform: gpio
    pin:
      number: GPIO13
      inverted: true
      mode:
        input: true
        pullup: true
    id: "bedroomNightLampSwitch"
    on_press:
      - light.turn_on: bedroomNightLamp
    on_release:
      - light.turn_off: bedroomNightLamp

  - platform: gpio
    pin:
      number: GPIO4
      inverted: true
      mode:
        input: true
        pullup: true
    id: "bedroomSocketSwitch"
    on_press:
      - switch.turn_on: bedroomSocket
    on_release:
      - switch.turn_off: bedroomSocket

# ------------------ WIFI ------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "Bedroom-Smart-Switch-Board"
    password: "Amanagam123"